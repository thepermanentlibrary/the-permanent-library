<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Permanent Library — Search</title>
<style>
:root {
  --vault-950:#0a0b0d;--vault-900:#111318;--vault-800:#1a1d24;--vault-700:#252930;
  --vault-600:#3a3f4a;--vault-500:#555b68;--vault-400:#7d8491;--vault-300:#b0b5bf;
  --vault-200:#d4d7dd;--vault-100:#ecedf0;--amber:#d4a04a;--amber-bright:#f0c05e;
  --amber-dim:#9a7432;--danger:#e54d4d;--success:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia','Times New Roman',serif;background:var(--vault-950);
  color:var(--vault-200);min-height:100vh;line-height:1.6}
::selection{background:var(--amber);color:var(--vault-950)}
.container{max-width:960px;margin:0 auto;padding:24px 32px}

/* Header */
header{padding:32px 0 24px;margin-bottom:28px;text-align:center;
  border-bottom:1px solid var(--vault-800);position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent)}
header h1{font-size:30px;color:var(--vault-100);letter-spacing:1px;font-weight:normal}
header .tagline{font-size:13px;color:var(--vault-500);font-family:system-ui,sans-serif;
  margin-top:6px;font-style:italic;letter-spacing:0.3px}
.stats-bar{display:flex;justify-content:center;margin-top:12px;
  font-family:system-ui,sans-serif;font-size:12px;color:var(--vault-500)}
.stats-bar strong{color:var(--amber)}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:24px}
.search-bar input{flex:1;padding:12px 16px;background:var(--vault-900);border:1px solid var(--vault-700);
  border-radius:8px;color:var(--vault-100);font-size:14px;font-family:system-ui,sans-serif;
  outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--amber)}
.search-bar input::placeholder{color:var(--vault-600)}
.search-bar select{padding:12px 14px;background:var(--vault-900);border:1px solid var(--vault-700);
  border-radius:8px;color:var(--vault-100);font-size:13px;font-family:system-ui,sans-serif;
  outline:none;cursor:pointer}
.search-bar button{padding:12px 24px;background:var(--amber);color:var(--vault-950);
  border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;
  font-family:system-ui,sans-serif;transition:background .2s;letter-spacing:0.3px}
.search-bar button:hover{background:var(--amber-bright)}

/* Document list */
.doc-list{display:flex;flex-direction:column;gap:12px}
.doc-card{padding:18px 20px;background:var(--vault-900);border:1px solid var(--vault-700);
  border-left:3px solid var(--amber-dim);border-radius:4px 8px 8px 4px;
  cursor:pointer;transition:all .2s}
.doc-card:hover{border-left-color:var(--amber);border-color:var(--vault-600);
  background:var(--vault-800)}
.doc-title{font-size:17px;color:var(--vault-100);margin-bottom:6px}
.doc-meta{font-family:system-ui,sans-serif;font-size:12px;color:var(--vault-500);
  display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.doc-meta span{display:flex;align-items:center;gap:4px}
.doc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.doc-tag{padding:2px 10px;background:var(--vault-800);border:1px solid var(--vault-700);
  border-radius:12px;font-size:11px;color:var(--amber-dim);font-family:system-ui,sans-serif}
.doc-preview{font-size:13px;color:var(--vault-400);line-height:1.5;
  overflow:hidden;max-height:60px}

/* Document view */
.doc-view{padding:24px;background:var(--vault-900);border:1px solid var(--vault-700);
  border-radius:8px;margin-bottom:16px}
.doc-view h2{font-size:24px;color:var(--vault-100);margin-bottom:14px}
.doc-view-meta{font-family:system-ui,sans-serif;font-size:12px;color:var(--vault-500);
  display:flex;flex-direction:column;gap:4px;margin-bottom:16px;
  padding:14px 16px;border:1px solid var(--vault-800);border-radius:6px;
  background:var(--vault-950)}
.doc-view-meta code{font-size:11px;color:var(--vault-400);word-break:break-all}
.doc-view-meta a{color:var(--amber);text-decoration:none}
.doc-view-meta a:hover{text-decoration:underline}

/* Document content */
.doc-content{font-size:15px;line-height:1.8}
.doc-content h1{font-size:26px;color:var(--vault-100);margin:20px 0 10px}
.doc-content h2{font-size:20px;color:var(--vault-100);margin:16px 0 8px}
.doc-content h3{font-size:17px;color:var(--vault-200);margin:14px 0 6px}
.doc-content p{margin:8px 0}
.doc-content a{color:var(--amber)}
.doc-content strong{color:var(--vault-100)}
.doc-content code{background:var(--vault-800);padding:2px 6px;border-radius:3px;
  font-family:'Consolas',monospace;font-size:13px;color:var(--amber-bright)}
.doc-content pre{background:var(--vault-800);padding:16px;border-radius:6px;
  overflow-x:auto;margin:12px 0}
.doc-content pre code{background:none;padding:0}
.doc-content blockquote{border-left:3px solid var(--amber-dim);padding-left:16px;
  color:var(--vault-400);margin:12px 0}
.doc-content img{max-width:100%;height:auto;border-radius:6px;margin:12px 0;display:block;cursor:zoom-in}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);
  z-index:9999;cursor:zoom-out;align-items:center;justify-content:center;padding:20px}
.lightbox.active{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px}
.doc-content ul,.doc-content ol{padding-left:24px;margin:8px 0}
.doc-content table{width:100%;border-collapse:collapse;margin:12px 0}
.doc-content th,.doc-content td{border:1px solid var(--vault-700);padding:8px 12px;
  text-align:left;font-size:13px}
.doc-content th{background:var(--vault-800);color:var(--vault-100)}

/* Buttons */
.back-btn{padding:8px 16px;background:var(--vault-700);color:var(--vault-200);
  border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui,sans-serif;
  margin-bottom:16px;transition:background .2s}
.back-btn:hover{background:var(--vault-600)}
.dl-btn{padding:8px 16px;background:var(--amber-dim);color:var(--vault-100);
  border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui,sans-serif;
  margin-bottom:16px;margin-left:8px;transition:background .2s}
.dl-btn:hover{background:var(--amber)}

/* Notices & states */
.notice{padding:12px 16px;background:rgba(212,160,74,0.1);border:1px solid var(--amber-dim);
  border-radius:6px;font-size:13px;color:var(--amber);font-family:system-ui,sans-serif;
  margin-bottom:16px}
.empty{text-align:center;padding:40px 20px;color:var(--vault-500);font-family:system-ui,sans-serif}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px;
  padding-top:16px;border-top:1px solid var(--vault-800);
  font-family:system-ui,sans-serif;font-size:13px;color:var(--vault-400)}
.pagination button{width:110px;padding:8px 0;background:var(--vault-800);color:var(--vault-200);
  border:1px solid var(--vault-700);border-radius:6px;cursor:pointer;font-size:13px;
  font-family:system-ui,sans-serif;transition:all .2s;text-align:center}
.pagination button:hover:not(:disabled){background:var(--vault-700);border-color:var(--vault-500)}
.pagination button:disabled{opacity:0.3;cursor:not-allowed}
.pagination span{min-width:60px;text-align:center}

/* Footer */
footer{border-top:1px solid var(--vault-800);margin-top:40px;padding:20px 0;
  font-size:11px;color:var(--vault-600);font-family:system-ui,sans-serif;
  display:flex;justify-content:space-between;align-items:center}
.nav-link{color:var(--amber-dim);font-size:12px;font-family:system-ui,sans-serif;
  text-decoration:none;margin-top:8px;display:inline-block;letter-spacing:0.3px;
  transition:color 0.2s}
.nav-link:hover{color:var(--amber)}
.terms-link{color:var(--vault-600);text-decoration:none;transition:color 0.2s}
.terms-link:hover{color:var(--amber-dim)}
</style>
</head>
<body>
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="Expanded figure">
</div>
<div class="container">
  <header>
    <h1>The Permanent Library</h1>
    <p class="tagline">Knowledge that outlives those who create it</p>
    <a href="/" class="nav-link">Upload a document →</a>
    <div class="stats-bar" id="stats"></div>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search documents…" />
    <select id="chain-filter">
      <option value="">All Chains</option>
      <option value="ethereum">Ethereum</option>
      <option value="polygon">Polygon</option>
      <option value="arbitrum">Arbitrum</option>
    </select>
    <button id="search-btn">Search</button>
  </div>

  <!-- Results / Document View -->
  <div id="content">
    <div class="empty">Loading recent documents…</div>
  </div>

  <footer>
    <span>The Permanent Library — Open Source Public Good · <a href="/terms.html" class="terms-link">Terms</a></span>
    <span>All data is on-chain and accessible even if this portal goes down.</span>
  </footer>
</div>

<!-- marked.js served locally — no external CDN dependency -->
<script src="/marked.umd.js"></script>

<!-- Search portal logic — external file for CSP compliance -->
<script src="/search.js"></script>
</body>
</html>
